services:
  postgres:
    image: postgres:16-alpine
    container_name: electronics_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: electronics_inventory
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d electronics_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: electronics_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: ghcr.io/kevin-j-thomas/electronicsprices/backend:${IMAGE_TAG:-latest}
    container_name: electronics_migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
    command: uv run alembic upgrade head
    restart: "no"

  backend:
    image: ghcr.io/kevin-j-thomas/electronicsprices/backend:${IMAGE_TAG:-latest}
    container_name: electronics_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      ENVIRONMENT: production
      ADMIN_API_KEY: ${ADMIN_API_KEY}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  worker:
    image: ghcr.io/kevin-j-thomas/electronicsprices/backend:${IMAGE_TAG:-latest}
    container_name: electronics_worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: uv run celery -A app.core.celery_app.celery_app worker --loglevel=info -Q celery

  beat:
    image: ghcr.io/kevin-j-thomas/electronicsprices/backend:${IMAGE_TAG:-latest}
    container_name: electronics_beat
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: uv run celery -A app.core.celery_app.celery_app beat --loglevel=info

  flower:
    image: mher/flower:2.0
    container_name: electronics_flower
    restart: unless-stopped
    command: celery --broker=${REDIS_URL:-redis://redis:6379/0} flower --port=5555
    expose:
      - "5555"
    depends_on:
      - redis

  frontend:
    image: ghcr.io/kevin-j-thomas/electronicsprices/frontend:${IMAGE_TAG:-latest}
    container_name: electronics_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: electronics_nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - flower

volumes:
  postgres_data:
  redis_data:
