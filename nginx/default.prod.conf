# Use Docker's internal DNS so nginx re-resolves upstream names after container restarts
resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80;
    server_name grattchi.tech www.grattchi.tech;
    client_max_body_size 50M;

    location / {
        set $upstream_frontend http://frontend:3000;
        proxy_pass         $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.grattchi.tech;
    client_max_body_size 50M;

    location / {
        set $upstream_backend http://backend:8000;
        proxy_pass         $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name flower.grattchi.tech;
    client_max_body_size 50M;

    location / {
        set $upstream_flower http://flower:5555;
        proxy_pass         $upstream_flower;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name _;
    return 404 "Not found\n";
}
