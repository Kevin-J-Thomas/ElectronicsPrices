upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8000;
}

upstream flower_upstream {
    server flower:5555;
}

# Frontend — http://inventory.local
server {
    listen 80;
    server_name inventory.local;

    client_max_body_size 50M;

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Backend API — http://api.inventory.local
server {
    listen 80;
    server_name api.inventory.local;

    client_max_body_size 50M;

    location / {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS for frontend
        add_header Access-Control-Allow-Origin "http://inventory.local" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-Admin-Key, Authorization" always;
        add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}

# Flower (Celery monitor) — http://flower.inventory.local
server {
    listen 80;
    server_name flower.inventory.local;

    location / {
        proxy_pass http://flower_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Fallback — requests to unknown host
server {
    listen 80 default_server;
    server_name _;
    return 404 "Unknown host. Try inventory.local, api.inventory.local, or flower.inventory.local";
}
