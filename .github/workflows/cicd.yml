name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: ghcr.io/kevin-j-thomas/electronicsprices/backend
  FRONTEND_IMAGE: ghcr.io/kevin-j-thomas/electronicsprices/frontend
  DEPLOY_DIR: /opt/electronicsprices

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend
      - name: Run ruff
        run: uv run ruff check app tests
        working-directory: backend

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend
      - name: Run ESLint
        run: npm run lint
        working-directory: frontend
      - name: Run TypeScript check
        run: npm run typecheck
        working-directory: frontend

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: electronics_inventory_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/electronics_inventory_test
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test
      ADMIN_API_KEY: ci-test-key
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend
      - name: Run migrations
        run: uv run alembic upgrade head
        working-directory: backend
      - name: Run tests
        run: uv run pytest -q
        working-directory: backend

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-backend, lint-frontend, test-backend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.grattchi.tech
            NEXT_PUBLIC_ADMIN_KEY=${{ secrets.ADMIN_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write .env.prod to server
        run: |
          {
            echo "POSTGRES_PASSWORD=Pr1cesDB2024prod"
            echo "DATABASE_URL=postgresql://postgres:Pr1cesDB2024prod@postgres:5432/electronics_inventory"
            echo "REDIS_URL=redis://redis:6379/0"
            echo "ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}"
            echo "NEXT_PUBLIC_API_URL=https://api.grattchi.tech"
            echo "NEXT_PUBLIC_ADMIN_KEY=${{ secrets.ADMIN_API_KEY }}"
            echo "IMAGE_TAG=${{ github.sha }}"
          } > /tmp/env.prod
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            /tmp/env.prod \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_DIR }}/.env.prod"

      - name: Copy deployment files to server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "mkdir -p ${{ env.DEPLOY_DIR }}/nginx"
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            docker-compose.prod.yml \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_DIR }}/"
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            nginx/default.prod.conf \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_DIR }}/nginx/default.prod.conf"

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE_TAG
          script: |
            set -e
            cd /opt/electronicsprices

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            IMAGE_TAG="$IMAGE_TAG" docker compose --env-file .env.prod -f docker-compose.prod.yml pull

            IMAGE_TAG="$IMAGE_TAG" docker compose --env-file .env.prod -f docker-compose.prod.yml up migrate

            IMAGE_TAG="$IMAGE_TAG" docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans

            docker logout ghcr.io
            docker image prune -f

            echo "Deployed image: $IMAGE_TAG"
